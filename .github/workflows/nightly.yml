name: Nightly

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ignored-integration:
    name: mfn-node ignored P2P / produce smokes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - run: cargo build -p mfn-node --bin mfnd --release
      - name: Run ignored integration tests (sequential)
        run: cargo test -p mfn-node --release -- --ignored --test-threads=1
      - name: Run ignored emission simulations
        run: cargo test -p mfn-consensus --release --test emission_simulation -- --ignored --test-threads=1
      - name: Run ignored apply_block proptest harness
        run: cargo test -p mfn-consensus --release --test apply_block_proptest -- --ignored --test-threads=1

  participant-rehearsal-smoke:
    name: public-devnet participant rehearsal smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Run participant rehearsal smoke (10s slot mesh)
        shell: bash
        env:
          SLOT_MS: 10000
          MFN_DEVNET_NO_OBSERVER: 1
        run: bash scripts/public-devnet-v1/participant-rehearsal-smoke.sh

  participant-rehearsal-smoke-observer:
    name: public-devnet observer rehearsal smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Run observer-enabled participant rehearsal smoke (10s slot mesh)
        shell: bash
        env:
          SLOT_MS: 10000
        run: bash scripts/public-devnet-v1/participant-rehearsal-smoke.sh --with-observer --min-hub-height 5 --wait-min-hub-height-seconds 300
