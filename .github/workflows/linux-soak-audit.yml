name: Linux Soak Audit

on:
  workflow_dispatch:
    inputs:
      slot_ms:
        description: Block slot duration in milliseconds
        required: true
        default: "30000"
      duration_minutes:
        description: Soak duration in minutes
        required: true
        default: "35"
      min_final_height:
        description: Minimum hub height for PASS
        required: true
        default: "10"

permissions:
  contents: read

concurrency:
  group: linux-soak-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  linux-soak-audit:
    name: Linux public-devnet soak audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Pre-build mfnd for soak bootstrap
        shell: bash
        run: cargo build -p mfn-node --release --bin mfnd
      - name: Run Linux soak with archive evidence
        shell: bash
        env:
          SLOT_MS: ${{ github.event.inputs.slot_ms }}
        run: |
          set -euo pipefail
          bash scripts/public-devnet-v1/soak.sh \
            --duration-minutes "${{ github.event.inputs.duration_minutes }}" \
            --restart-observer-once \
            --min-final-height "${{ github.event.inputs.min_final_height }}" \
            --archive-evidence
      - name: Upload soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-soak-evidence-slot-${{ github.event.inputs.slot_ms }}
          path: scripts/public-devnet-v1/evidence/soak-restart-linux-*.txt
          if-no-files-found: warn
      - name: Commit PASS soak evidence to main
        if: success()
        env:
          MIN_FINAL_HEIGHT: ${{ github.event.inputs.min_final_height }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/public-devnet-v1/evidence/soak-restart-linux-*.txt)
          if ((${#files[@]} == 0)); then
            echo "No soak evidence transcript to commit"
            exit 0
          fi
          evidence="${files[${#files[@]} - 1]}"
          if ! grep -q 'soak: SUMMARY status=PASS' "$evidence"; then
            echo "Soak transcript is not PASS; skip commit ($evidence)"
            exit 0
          fi
          max_height="$(grep -oE 'max_height=[0-9]+' "$evidence" | tail -1 | cut -d= -f2 || true)"
          if [[ -z "$max_height" || "$max_height" -lt "$MIN_FINAL_HEIGHT" ]]; then
            echo "Soak max_height=$max_height below MIN_FINAL_HEIGHT=$MIN_FINAL_HEIGHT; skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$evidence"
          if git diff --staged --quiet; then
            echo "Evidence already committed"
            exit 0
          fi
          git commit -m "evidence: Linux 30s-slot soak PASS (B-05) [skip ci]"
          git push
