<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">Permawrite money flow (numbered loop)</title>
  <desc id="desc">How MFN moves through the protocol, as a numbered loop. START at the emission curve. Step 1: emission mints fresh MFN into the coinbase. Step 2: the coinbase pays the block producer. Step 3: MFN circulates and is spent. Step 4: a privacy transaction pays a fee. Step 5: each fee splits 90 percent to the storage treasury and 10 percent to the producer. Step 6 (conditional): uploads must fund the treasury with the required endowment. Step 7: every block a SPoRA storage proof is verified. Step 8: the treasury drains to fund the storage reward, which is settled into the producer coinbase, with emission acting only as a backstop when the treasury is short. The loop then returns to step 2. Note: in the current implementation the storage reward is paid to the block producer, not directly to the storage operator; a direct operator payout is planned.</desc>
  <defs>
    <style>
      .bg-fill { fill: #ffffff; }
      .panel-fill { fill: #ffffff; }
      .panel-privacy-fill { fill: #f5f3ff; }
      .panel-storage-fill { fill: #ecfeff; }
      .panel-treasury-fill { fill: #fffbeb; }
      .panel-note-fill { fill: #f8fafc; }
      .text-strong { fill: #0f172a; }
      .text-muted { fill: #475569; }
      .text-faint { fill: #94a3b8; }
      .text-treasury { fill: #b45309; }
      .text-privacy { fill: #6d28d9; }
      .text-storage { fill: #0e7490; }
      .stroke-muted { stroke: #94a3b8; }
      .stroke-emission { stroke: #16a34a; }
      .stroke-storage { stroke: #0891b2; }
      .stroke-treasury { stroke: #d97706; }
      .stroke-privacy { stroke: #7c3aed; }
      .stroke-dark { stroke: #0f172a; }
      .flow-fee { stroke: #d97706; stroke-width: 3; fill: none; }
      .flow-emission { stroke: #16a34a; stroke-width: 3; fill: none; }
      .flow-reward { stroke: #7c3aed; stroke-width: 3; fill: none; }
      .flow-backstop { stroke: #16a34a; stroke-width: 2.5; fill: none; stroke-dasharray: 6 4; }
      .flow-circulate { stroke: #475569; stroke-width: 2.5; fill: none; stroke-dasharray: 4 4; }
      .flow-planned { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 2 4; }
      .flow-fee-head { fill: #d97706; }
      .flow-emission-head { fill: #16a34a; }
      .flow-reward-head { fill: #7c3aed; }
      .flow-circulate-head { fill: #475569; }
      .flow-planned-head { fill: #94a3b8; }
      .step-badge { fill: #0f172a; }
      .step-num { fill: #ffffff; font-weight: 700; }
      .start-pill { fill: #16a34a; }
      @media (prefers-color-scheme: dark) {
        .bg-fill { fill: #0d1117; }
        .panel-fill { fill: #161b22; }
        .panel-privacy-fill { fill: #1d1633; }
        .panel-storage-fill { fill: #052730; }
        .panel-treasury-fill { fill: #2b1e07; }
        .panel-note-fill { fill: #12161d; }
        .text-strong { fill: #f0f6fc; }
        .text-muted { fill: #c9d1d9; }
        .text-faint { fill: #8b949e; }
        .text-treasury { fill: #fbbf24; }
        .text-privacy { fill: #c4b5fd; }
        .text-storage { fill: #67e8f9; }
        .stroke-dark { stroke: #f0f6fc; }
        .step-badge { fill: #f0f6fc; }
        .step-num { fill: #0d1117; }
      }
    </style>
    <marker id="m-fee" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="flow-fee-head"/></marker>
    <marker id="m-emission" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="flow-emission-head"/></marker>
    <marker id="m-reward" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="flow-reward-head"/></marker>
    <marker id="m-circ" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="flow-circulate-head"/></marker>
    <marker id="m-planned" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="flow-planned-head"/></marker>
  </defs>

  <rect class="bg-fill" width="100%" height="100%"/>

  <text x="600" y="46" text-anchor="middle" font-size="26" font-weight="700" class="text-strong">Permawrite &#8212; the economic engine (follow 1 &#8594; 8)</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" class="text-muted">Privacy demand pays for permanent storage. Default 90% of every fee flows to the storage treasury.</text>

  <!-- Legend -->
  <g transform="translate(70,96)">
    <line x1="0" y1="8" x2="30" y2="8" class="flow-emission" marker-end="url(#m-emission)"/>
    <text x="38" y="12" font-size="12.5" font-weight="600" class="text-strong">emission (fresh MFN)</text>
    <line x1="215" y1="8" x2="245" y2="8" class="flow-fee" marker-end="url(#m-fee)"/>
    <text x="253" y="12" font-size="12.5" font-weight="600" class="text-strong">fee revenue</text>
    <line x1="360" y1="8" x2="390" y2="8" class="flow-reward" marker-end="url(#m-reward)"/>
    <text x="398" y="12" font-size="12.5" font-weight="600" class="text-strong">storage reward</text>
    <line x1="540" y1="8" x2="570" y2="8" class="flow-backstop" marker-end="url(#m-emission)"/>
    <text x="578" y="12" font-size="12.5" font-weight="600" class="text-strong">emission backstop (only if treasury empty)</text>
    <line x1="890" y1="8" x2="920" y2="8" class="flow-circulate" marker-end="url(#m-circ)"/>
    <text x="928" y="12" font-size="12.5" font-weight="600" class="text-strong">circulation</text>
  </g>

  <!-- ============ TOP ROW: emission -> coinbase -> producer ============ -->
  <g>
    <rect x="60" y="160" width="250" height="96" rx="12" class="panel-fill stroke-emission" stroke-width="2"/>
    <text x="185" y="192" text-anchor="middle" font-size="16" font-weight="700" class="text-strong">EMISSION CURVE</text>
    <text x="185" y="214" text-anchor="middle" font-size="12" class="text-muted">Bitcoin-style halvings &#8594;</text>
    <text x="185" y="232" text-anchor="middle" font-size="12" class="text-muted">Monero-style tail (0.195 MFN/blk)</text>
    <!-- START pill -->
    <g transform="translate(60,138)">
      <rect x="0" y="0" width="74" height="24" rx="12" class="start-pill"/>
      <text x="37" y="16" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">START</text>
    </g>
  </g>

  <g>
    <rect x="475" y="160" width="250" height="96" rx="12" class="panel-fill stroke-dark" stroke-width="2"/>
    <text x="600" y="190" text-anchor="middle" font-size="16" font-weight="700" class="text-strong">COINBASE</text>
    <text x="600" y="212" text-anchor="middle" font-size="12" class="text-muted">subsidy + producer_fee</text>
    <text x="600" y="230" text-anchor="middle" font-size="12" class="text-muted">+ storage_reward_total</text>
  </g>

  <g>
    <rect x="890" y="160" width="250" height="96" rx="12" class="panel-fill stroke-dark" stroke-width="2"/>
    <text x="1015" y="190" text-anchor="middle" font-size="16" font-weight="700" class="text-strong">PRODUCER WALLET</text>
    <text x="1015" y="212" text-anchor="middle" font-size="12" class="text-muted">earns subsidy + 10% of fees</text>
    <text x="1015" y="230" text-anchor="middle" font-size="12" class="text-muted">+ the storage reward (see 8)</text>
  </g>

  <!-- Step 1: emission -> coinbase -->
  <path d="M310,208 L475,208" class="flow-emission" marker-end="url(#m-emission)"/>
  <g transform="translate(392,208)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">1</text></g>
  <text x="392" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">mints</text>

  <!-- Step 2: coinbase -> producer -->
  <path d="M725,208 L890,208" class="flow-emission" marker-end="url(#m-emission)"/>
  <g transform="translate(807,208)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">2</text></g>
  <text x="807" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">pays producer</text>
  <text x="807" y="150" text-anchor="middle" font-size="11.5" font-weight="600" class="text-faint">&#8635; loop closes here (from 8)</text>

  <!-- ============ RIGHT: producer -> privacy tx (circulation) ============ -->
  <g>
    <rect x="820" y="470" width="320" height="120" rx="14" class="panel-privacy-fill stroke-privacy" stroke-width="2.5"/>
    <text x="980" y="502" text-anchor="middle" font-size="18" font-weight="700" class="text-privacy">PRIVACY TRANSACTION</text>
    <text x="980" y="524" text-anchor="middle" font-size="12.5" class="text-muted">CLSAG ring &#183; stealth outputs &#183; Pedersen</text>
    <text x="980" y="542" text-anchor="middle" font-size="12.5" class="text-muted">commitments &#183; Bulletproof range proofs</text>
    <text x="980" y="566" text-anchor="middle" font-size="12.5" font-weight="700" class="text-strong">+ optional storage commitment</text>
  </g>

  <!-- Step 3: producer -> privacy tx -->
  <path d="M1015,256 L1015,470" class="flow-circulate" marker-end="url(#m-circ)"/>
  <g transform="translate(1015,363)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">3</text></g>
  <text x="1030" y="367" font-size="12" font-weight="600" class="text-muted">circulates &#38; is spent</text>

  <!-- ============ FEE split node ============ -->
  <g>
    <circle cx="600" cy="530" r="48" class="panel-treasury-fill stroke-treasury" stroke-width="2.5"/>
    <text x="600" y="525" text-anchor="middle" font-size="15" font-weight="700" class="text-treasury">FEE</text>
    <text x="600" y="545" text-anchor="middle" font-size="11" font-weight="600" class="text-muted">split 90/10</text>
  </g>

  <!-- Step 4: privacy tx -> fee -->
  <path d="M820,530 L648,530" class="flow-fee" marker-end="url(#m-fee)"/>
  <g transform="translate(734,530)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">4</text></g>
  <text x="734" y="512" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">pays fee</text>

  <!-- ============ TREASURY ============ -->
  <g>
    <rect x="60" y="470" width="320" height="120" rx="14" class="panel-treasury-fill stroke-treasury" stroke-width="2.5"/>
    <text x="220" y="502" text-anchor="middle" font-size="18" font-weight="700" class="text-treasury">STORAGE TREASURY</text>
    <text x="220" y="526" text-anchor="middle" font-size="12.5" class="text-muted">accumulates 90% of every fee</text>
    <text x="220" y="546" text-anchor="middle" font-size="12.5" class="text-muted">drains per block to fund storage reward</text>
    <text x="220" y="568" text-anchor="middle" font-size="12" font-weight="700" class="text-strong">ChainState::treasury : u128</text>
  </g>

  <!-- Step 5: fee -> treasury (90%) and fee -> producer (10%) -->
  <path d="M552,530 L380,530" class="flow-fee" marker-end="url(#m-fee)"/>
  <g transform="translate(466,530)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">5</text></g>
  <g>
    <rect x="437" y="486" width="58" height="22" rx="4" class="panel-fill stroke-dark" stroke-width="1.3"/>
    <text x="466" y="502" text-anchor="middle" font-size="12" font-weight="700" class="text-strong">90%</text>
  </g>

  <path d="M628,494 Q760,300 890,214" class="flow-fee" marker-end="url(#m-fee)"/>
  <g>
    <rect x="712" y="360" width="58" height="22" rx="4" class="panel-fill stroke-dark" stroke-width="1.3"/>
    <text x="741" y="376" text-anchor="middle" font-size="12" font-weight="700" class="text-strong">10%</text>
  </g>
  <text x="741" y="345" text-anchor="middle" font-size="11.5" font-weight="600" class="text-muted">producer tip</text>

  <!-- ============ BOTTOM: upload endowment + SPoRA proof ============ -->
  <g>
    <rect x="60" y="690" width="330" height="120" rx="14" class="panel-storage-fill stroke-storage" stroke-width="2.5"/>
    <text x="225" y="722" text-anchor="middle" font-size="17" font-weight="700" class="text-storage">UPLOAD ENDOWMENT</text>
    <text x="225" y="745" text-anchor="middle" font-size="12.5" class="text-muted">required_endowment(size, replication, params)</text>
    <text x="225" y="766" text-anchor="middle" font-size="12.5" font-weight="700" class="text-strong" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">E&#8320; = C&#8320; &#183; (1 + i) / (r &#8722; i)</text>
    <text x="225" y="788" text-anchor="middle" font-size="11.5" class="text-muted">enforced: tx fee&#8217;s treasury share &#8805; E&#8320;</text>
  </g>

  <g>
    <rect x="700" y="690" width="440" height="120" rx="14" class="panel-storage-fill stroke-storage" stroke-width="2.5"/>
    <text x="920" y="720" text-anchor="middle" font-size="17" font-weight="700" class="text-storage">SPoRA PROOF &#183; PER BLOCK</text>
    <text x="920" y="742" text-anchor="middle" font-size="12.5" class="text-muted">deterministic chunk challenge from prev_id + slot</text>
    <text x="920" y="761" text-anchor="middle" font-size="12.5" class="text-muted">operator submits proof &#183; verified by apply_block</text>
    <text x="920" y="783" text-anchor="middle" font-size="12" font-weight="700" class="text-strong">accrue_proof_reward(...)</text>
  </g>

  <!-- Step 6: upload endowment -> treasury (conditional) -->
  <path d="M225,690 L225,590" class="flow-fee" marker-end="url(#m-fee)"/>
  <g transform="translate(225,640)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">6</text></g>
  <text x="240" y="644" font-size="11.5" font-weight="600" class="text-muted">if upload: funds treasury</text>

  <!-- Step 7: SPoRA proof drives the reward (proof -> treasury drain) -->
  <path d="M700,742 Q470,690 392,600" class="flow-reward" marker-end="url(#m-reward)"/>
  <g transform="translate(545,690)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">7</text></g>
  <text x="560" y="676" font-size="11.5" font-weight="700" fill="#7c3aed">valid proof &#8594; earns reward</text>

  <!-- Step 8: treasury -> storage reward settled into producer coinbase -->
  <path d="M300,470 Q360,300 475,224" class="flow-reward" marker-end="url(#m-reward)"/>
  <g transform="translate(360,336)"><circle r="14" class="step-badge"/><text y="5" text-anchor="middle" font-size="15" class="step-num">8</text></g>
  <text x="300" y="300" font-size="12" font-weight="700" fill="#7c3aed">storage reward &#8594;</text>
  <text x="300" y="316" font-size="12" font-weight="700" fill="#7c3aed">producer coinbase</text>

  <!-- Emission backstop: emission -> reward path (only if treasury empty) -->
  <path d="M150,256 Q120,420 130,470" class="flow-backstop" marker-end="url(#m-emission)"/>
  <text x="78" y="392" font-size="11" font-weight="600" class="text-faint">backstop</text>
  <text x="86" y="408" font-size="10.5" class="text-faint">(rare)</text>

  <!-- Planned: direct operator payout (not yet implemented) -->
  <path d="M1075,690 Q1170,470 1140,262" class="flow-planned" marker-end="url(#m-planned)"/>
  <text x="1150" y="486" text-anchor="middle" font-size="11" font-weight="600" class="text-faint" transform="rotate(90 1150,486)">planned: direct operator payout</text>

  <!-- ============ Accuracy note ============ -->
  <g transform="translate(340,826)">
    <rect x="0" y="0" width="800" height="66" rx="10" class="panel-note-fill stroke-muted" stroke-width="1.5"/>
    <text x="18" y="22" font-size="12.5" font-weight="700" class="text-strong">Reality of who is paid (current build)</text>
    <text x="18" y="41" font-size="11.5" class="text-muted">The storage reward (step 8) is settled into the <tspan font-weight="700" class="text-strong">producer&#8217;s coinbase</tspan> &#8212; not a separate operator wallet.</text>
    <text x="18" y="58" font-size="11.5" class="text-muted">An operator earns only when it also produces the block. Direct operator payout is planned (PROBLEMS &#167;17).</text>
  </g>
</svg>
