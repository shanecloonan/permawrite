name: RC Validation After CI

# Manual operator dispatch when Nightly must be re-run at a specific green commit.
# Green push CI auto-dispatches Nightly via the dispatch-nightly-rc job in ci.yml (M2.5.18).
# GitHub workflow_dispatch requires a branch/tag ref, not a raw commit SHA.
# Pass ci_head_sha so Nightly validates the exact green commit.
on:
  workflow_dispatch:
    inputs:
      ci_head_sha:
        description: "Green CI commit SHA to check out in Nightly"
        required: false
        type: string

permissions:
  actions: write
  contents: read

jobs:
  dispatch-nightly:
    name: Dispatch Nightly on green CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.inputs?.ci_head_sha || context.sha;
            const short = sha.slice(0, 7);
            core.info(`Dispatching Nightly at ref=main checkout_sha=${short}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              ref: 'main',
              inputs: {
                checkout_sha: sha,
              },
            });
            core.info('Nightly dispatch submitted');
