name: RC Validation After CI

# After green CI on main, dispatch Nightly (both rehearsal jobs) on the exact passing commit.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  dispatch-nightly:
    name: Dispatch Nightly on green CI
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const short = sha.slice(0, 7);
            const event = context.payload.workflow_run.event;
            core.info(`Dispatching Nightly for green CI commit ${short} (event=${event})`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              ref: sha,
            });
            core.info('Nightly dispatch submitted');