name: Nightly

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ignored-integration:
    name: mfn-node ignored P2P / produce smokes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - run: cargo build -p mfn-node --bin mfnd --release
      - name: Run ignored integration tests (sequential)
        run: cargo test -p mfn-node --release -- --ignored --test-threads=1
