name: CI Queue Cleanup

# Cancels stale CI runs on main so the latest push is not stuck behind a backlog.
# Never cancels CI for the commit that triggered this cleanup (context.sha).
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  actions: write

jobs:
  cancel-stale-ci:
    name: Cancel stale CI runs on main
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.sha;
            const branch = "main";
            let cancelled = 0;
            let preserved = 0;
            for (const status of ["queued", "in_progress"]) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: "ci.yml",
                branch,
                status,
                per_page: 50,
              });
              for (const run of data.workflow_runs) {
                if (run.head_sha === headSha) {
                  preserved += 1;
                  core.info(`Preserving current-commit CI run id=${run.id} sha=${run.head_sha.slice(0, 7)}`);
                  continue;
                }
                core.info(`Cancelling stale CI run id=${run.id} sha=${run.head_sha.slice(0, 7)} status=${run.status}`);
                try {
                  await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                  cancelled += 1;
                } catch (error) {
                  core.warning(`Failed to cancel run ${run.id}: ${error.message}`);
                }
              }
            }
            core.info(`CI queue cleanup finished cancelled=${cancelled} preserved=${preserved}`);