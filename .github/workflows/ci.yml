name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: rustup default stable && rustc --version && cargo --version
      - run: cargo fmt --all --check

  scripts:
    name: public-devnet scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Bash helper syntax
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for script in scripts/*.sh scripts/public-devnet-v1/*.sh; do
            bash -n "$script"
          done
          http_plan="$(bash scripts/public-devnet-v1/recovery-walkthrough.sh --plan-only --rpc 127.0.0.1:18731 --wallet ./alice.json --commit ababab --peer 127.0.0.1:18780 --expected-sha256 cdcd --prove)"
          [[ "$http_plan" == *"restore_mode=http"* ]] || { echo "$http_plan"; exit 1; }
          [[ "$http_plan" == *"optional sha256 verify"* ]] || { echo "$http_plan"; exit 1; }
          [[ "$http_plan" == *"only proves when --prove is set"* ]] || { echo "$http_plan"; exit 1; }
          p2p_plan="$(bash scripts/public-devnet-v1/recovery-walkthrough.sh --plan-only --rpc 127.0.0.1:18731 --wallet ./alice.json --commit ababab --data-dir /tmp/replica --expected-sha256 cdcd)"
          [[ "$p2p_plan" == *"restore_mode=p2p-inbox"* ]] || { echo "$p2p_plan"; exit 1; }
          [[ "$p2p_plan" == *"support-bundle -> recovery-plan -> restore"* ]] || { echo "$p2p_plan"; exit 1; }
      - name: Validate PowerShell helper syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = @()
          foreach ($script in Get-ChildItem scripts -Filter *.ps1 -Recurse) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $errors += $parseErrors | ForEach-Object { "$($script.FullName): $_" }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          $httpPlan = (powershell -NoProfile -File scripts/public-devnet-v1/recovery-walkthrough.ps1 -PlanOnly -Rpc 127.0.0.1:18731 -Wallet ./alice.json -CommitHash ababab -Peer 127.0.0.1:18780 -ExpectedSha256 cdcd -Prove) -join "`n"
          if ($httpPlan -notmatch "restore_mode=http" -or $httpPlan -notmatch "optional sha256 verify" -or $httpPlan -notmatch "only proves when -Prove is set") {
            $httpPlan
            exit 1
          }
          $p2pPlan = (powershell -NoProfile -File scripts/public-devnet-v1/recovery-walkthrough.ps1 -PlanOnly -Rpc 127.0.0.1:18731 -Wallet ./alice.json -CommitHash ababab -DataDir C:\tmp\replica -ExpectedSha256 cdcd) -join "`n"
          if ($p2pPlan -notmatch "restore_mode=p2p-inbox" -or $p2pPlan -notmatch "support-bundle -> recovery-plan -> restore") {
            $p2pPlan
            exit 1
          }

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Full workspace `--release` tests (proptests + integration smokes) exceed 45m on Linux/macOS.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure rustup-managed cargo is on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      # mfn-cli integration tests spawn `target/{profile}/mfnd` and `mfn-storage-operator`.
      - run: cargo build -p mfn-node --bin mfnd --release
      - run: cargo build -p mfn-storage-operator --bin mfn-storage-operator --release
      # Default `cargo test` skips `#[ignore]` slow P2P / multi-validator harness tests.
      - run: cargo test --workspace --release -- --test-threads=4

  wasm:
    name: wasm32 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc --version
          cargo --version
      - run: cargo build -p mfn-wasm --target wasm32-unknown-unknown --release --features wasm-full
      - run: cargo test -p mfn-wasm --release --features wasm-full
      - run: cargo install wasm-pack --locked
      - run: wasm-pack build mfn-wasm --target web --out-dir demo/web/pkg --release --features wasm-full

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - run: cargo install cargo-audit --locked
      - run: cargo audit
