name: Nightly

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      checkout_sha:
        description: Exact commit SHA to validate (from RC Validation After CI)
        required: false
        default: ""

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ignored-integration:
    name: mfn-node ignored P2P / produce smokes
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Pin Nightly checkout SHA
        shell: bash
        run: |
          set -euo pipefail
          pin="${{ github.event.inputs.checkout_sha || github.sha }}"
          if [ ${#pin} -lt 40 ]; then
            pin="$(git rev-parse "$pin")"
          fi
          git checkout --force "$pin"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - run: cargo build -p mfn-node --bin mfnd --release
      - name: Run ignored integration tests (sequential)
        run: cargo test -p mfn-node --release -- --ignored --test-threads=1
      - name: Run ignored emission simulations
        run: cargo test -p mfn-consensus --release --test emission_simulation -- --ignored --test-threads=1
      - name: Run ignored apply_block proptest harness
        run: cargo test -p mfn-consensus --release --test apply_block_proptest -- --ignored --test-threads=1

  participant-rehearsal-smoke:
    name: public-devnet participant rehearsal smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Pin Nightly checkout SHA
        shell: bash
        run: |
          set -euo pipefail
          pin="${{ github.event.inputs.checkout_sha || github.sha }}"
          if [ ${#pin} -lt 40 ]; then
            pin="$(git rev-parse "$pin")"
          fi
          git checkout --force "$pin"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Pre-build public-devnet binaries
        run: |
          cargo build -p mfn-node --bin mfnd --release
          cargo build -p mfn-cli --bin mfn-cli --release
          cargo build -p mfn-storage-operator --bin mfn-storage-operator --release
      - name: Run participant rehearsal smoke (10s slot mesh)
        shell: bash
        env:
          SLOT_MS: 10000
          MFN_DEVNET_NO_OBSERVER: 1
        run: bash scripts/public-devnet-v1/participant-rehearsal-smoke.sh --no-build --archive-evidence --wait-faucet-seconds 600 --wait-mined-seconds 480 --wait-upload-seconds 480 --wait-proof-seconds 480
      - name: Assert audit-ready rehearsal evidence staged
        if: success()
        run: |
          set -euo pipefail
          bash scripts/public-devnet-v1/assert-participant-smoke-evidence.sh | tee /tmp/participant-evidence-assert.txt
          {
            echo "### Rehearsal evidence assert"
            echo '```text'
            cat /tmp/participant-evidence-assert.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload partial rehearsal evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: participant-rehearsal-evidence-partial
          path: scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/
          if-no-files-found: ignore
      - name: Dump devnet logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== devnet-ports.env ==="
          cat scripts/public-devnet-v1/devnet-ports.env 2>/dev/null || true
          echo "=== logs/v0.log (tail) ==="
          tail -n 200 scripts/public-devnet-v1/logs/v0.log 2>/dev/null || echo "(no v0.log)"
          echo "=== logs/observer.log (tail) ==="
          tail -n 100 scripts/public-devnet-v1/logs/observer.log 2>/dev/null || true
          echo "=== participant-rehearsal.log (tail) ==="
          tail -n 80 scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/participant-rehearsal.log 2>/dev/null || echo "(no participant-rehearsal.log)"
          echo "=== STAGE= markers ==="
          grep -h 'STAGE=' scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/participant-rehearsal.log 2>/dev/null || echo "(no STAGE lines in participant-rehearsal.log)"
          echo "=== start-all progress (tail) ==="
          grep -h 'start-all:' scripts/public-devnet-v1/logs/v0.log scripts/public-devnet-v1/logs/v1.log scripts/public-devnet-v1/logs/v2.log 2>/dev/null | tail -n 40 || echo "(no start-all lines)"
      - name: Upload rehearsal logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: participant-rehearsal-logs
          path: |
            scripts/public-devnet-v1/logs/
            scripts/public-devnet-v1/devnet-ports.env
          if-no-files-found: ignore
      - name: Upload rehearsal evidence on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: participant-rehearsal-evidence
          path: |
            scripts/public-devnet-v1/evidence/
            scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/
          if-no-files-found: ignore

  participant-rehearsal-smoke-observer:
    name: public-devnet observer rehearsal smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Pin Nightly checkout SHA
        shell: bash
        run: |
          set -euo pipefail
          pin="${{ github.event.inputs.checkout_sha || github.sha }}"
          if [ ${#pin} -lt 40 ]; then
            pin="$(git rev-parse "$pin")"
          fi
          git checkout --force "$pin"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          cache-bin: false
      - name: Verify Rust toolchain
        shell: bash
        run: |
          rustup default stable
          rustc --version
          cargo --version
      - name: Pre-build public-devnet binaries
        run: |
          cargo build -p mfn-node --bin mfnd --release
          cargo build -p mfn-cli --bin mfn-cli --release
          cargo build -p mfn-storage-operator --bin mfn-storage-operator --release
      - name: Run observer-enabled participant rehearsal smoke (10s slot mesh)
        shell: bash
        env:
          SLOT_MS: 10000
        run: bash scripts/public-devnet-v1/participant-rehearsal-smoke.sh --no-build --with-observer --min-hub-height 5 --wait-min-hub-height-seconds 420 --wait-observer-catchup-seconds 420 --wait-faucet-seconds 600 --wait-mined-seconds 480 --wait-upload-seconds 480 --wait-proof-seconds 480 --archive-evidence
      - name: Assert audit-ready rehearsal evidence staged
        if: success()
        run: |
          set -euo pipefail
          bash scripts/public-devnet-v1/assert-participant-smoke-evidence.sh | tee /tmp/participant-evidence-assert.txt
          {
            echo "### Observer rehearsal evidence assert"
            echo '```text'
            cat /tmp/participant-evidence-assert.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload partial observer rehearsal evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observer-rehearsal-evidence-partial
          path: scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/
          if-no-files-found: ignore
      - name: Dump devnet logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== devnet-ports.env ==="
          cat scripts/public-devnet-v1/devnet-ports.env 2>/dev/null || true
          echo "=== logs/v0.log (tail) ==="
          tail -n 200 scripts/public-devnet-v1/logs/v0.log 2>/dev/null || echo "(no v0.log)"
          echo "=== logs/observer.log (tail) ==="
          tail -n 200 scripts/public-devnet-v1/logs/observer.log 2>/dev/null || echo "(no observer.log)"
          echo "=== participant-rehearsal.log (tail) ==="
          tail -n 80 scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/participant-rehearsal.log 2>/dev/null || echo "(no participant-rehearsal.log)"
          echo "=== STAGE= markers ==="
          grep -h 'STAGE=' scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/participant-rehearsal.log 2>/dev/null || echo "(no STAGE lines in participant-rehearsal.log)"
          echo "=== start-all progress (tail) ==="
          grep -h 'start-all:' scripts/public-devnet-v1/logs/v0.log scripts/public-devnet-v1/logs/v1.log scripts/public-devnet-v1/logs/v2.log 2>/dev/null | tail -n 40 || echo "(no start-all lines)"
      - name: Upload rehearsal logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observer-rehearsal-logs
          path: |
            scripts/public-devnet-v1/logs/
            scripts/public-devnet-v1/devnet-ports.env
          if-no-files-found: ignore
      - name: Upload observer rehearsal evidence on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: observer-rehearsal-evidence
          path: |
            scripts/public-devnet-v1/evidence/
            scripts/public-devnet-v1/participant-rehearsal-smoke/evidence/
          if-no-files-found: ignore
