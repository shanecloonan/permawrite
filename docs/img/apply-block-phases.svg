<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1180" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">apply_block phases</title>
  <desc id="desc">The sequential phases of apply_block in mfn-consensus: linkage, body Merkle roots, finality, transactions, equivocation slashing, SPoRA proofs, liveness, bond rotation, treasury settlement, and post-mutation root checks.</desc>
  <defs>
    <style>
      .bg-fill { fill: #ffffff; }
      .panel-fill { fill: #ffffff; }
      .panel-input { fill: #f1f5f9; }
      .text-strong { fill: #0f172a; }
      .text-muted { fill: #475569; }
      .text-faint { fill: #94a3b8; }
      .text-num { fill: #ffffff; }
      .stroke-muted { stroke: #475569; }
      .phase-fill-0 { fill: #475569; }
      .phase-fill-1 { fill: #0891b2; }
      .phase-fill-2 { fill: #0d9488; }
      .phase-fill-3 { fill: #7c3aed; }
      .phase-fill-4 { fill: #d97706; }
      .phase-fill-5 { fill: #ea580c; }
      .phase-fill-6 { fill: #16a34a; }
      .phase-fill-7 { fill: #ca8a04; }
      .phase-fill-8 { fill: #db2777; }
      .phase-fill-9 { fill: #2563eb; }
      .stroke-phase-0 { stroke: #475569; }
      .stroke-phase-1 { stroke: #0891b2; }
      .stroke-phase-2 { stroke: #0d9488; }
      .stroke-phase-3 { stroke: #7c3aed; }
      .stroke-phase-4 { stroke: #d97706; }
      .stroke-phase-5 { stroke: #ea580c; }
      .stroke-phase-6 { stroke: #16a34a; }
      .stroke-phase-7 { stroke: #ca8a04; }
      .stroke-phase-8 { stroke: #db2777; }
      .stroke-phase-9 { stroke: #2563eb; }
      .pipe { stroke: #94a3b8; stroke-width: 4; fill: none; }
      .pipe-head { fill: #94a3b8; }
      .reject-arrow { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 5 4; }
      .reject-head { fill: #dc2626; }
      .text-reject { fill: #dc2626; }
      .text-critical { fill: #dc2626; font-weight: 700; }
      .panel-output-ok { fill: #ecfdf5; stroke: #16a34a; }
      .panel-output-err { fill: #fef2f2; stroke: #dc2626; }
      @media (prefers-color-scheme: dark) {
        .bg-fill { fill: #0d1117; }
        .panel-fill { fill: #161b22; }
        .panel-input { fill: #1c2129; }
        .text-strong { fill: #f0f6fc; }
        .text-muted { fill: #c9d1d9; }
        .text-faint { fill: #8b949e; }
        .stroke-muted { stroke: #8b949e; }
        .pipe { stroke: #6e7681; }
        .pipe-head { fill: #6e7681; }
        .reject-arrow { stroke: #f87171; }
        .reject-head { fill: #f87171; }
        .text-reject { fill: #f87171; }
        .text-critical { fill: #fca5a5; }
        .panel-output-ok { fill: #052e21; stroke: #16a34a; }
        .panel-output-err { fill: #2d1010; stroke: #dc2626; }
      }
    </style>
    <marker id="m-pipe" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="pipe-head"/></marker>
    <marker id="m-reject" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="reject-head"/></marker>
  </defs>

  <rect class="bg-fill" width="100%" height="100%"/>

  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" class="text-strong">apply_block &#8212; state-transition function</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" class="text-muted">
    <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">mfn_consensus::block::apply_block</tspan> &#183; implementation in <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace">block/apply.rs</tspan>
  </text>

  <g>
    <rect x="80" y="96" width="260" height="84" rx="10" class="panel-input stroke-muted" stroke-width="1.5"/>
    <text x="210" y="122" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1.5" class="text-faint">INPUT</text>
    <text x="210" y="146" text-anchor="middle" font-size="14" font-weight="700" class="text-strong">ChainState + Block</text>
    <text x="210" y="166" text-anchor="middle" font-size="13" class="text-muted">(txs, bond_ops, slashings, storage_proofs)</text>
  </g>
  <text x="800" y="144" text-anchor="middle" font-size="13" class="text-muted">Sequential phases; any error rejects the whole block (state unchanged).</text>

  <line x1="210" y1="180" x2="210" y2="1080" class="pipe"/>

  <g transform="translate(180,200)">
    <circle cx="30" cy="0" r="20" class="phase-fill-0"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">0</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-0" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">Linkage</text>
    <text x="100" y="14" font-size="13" class="text-muted">height = prev + 1 &#183; prev_hash = tip (or genesis rules).</text>
  </g>
  <path d="M210,230 L210,248" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,262)">
    <circle cx="30" cy="0" r="20" class="phase-fill-1"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">1</text>
    <rect x="80" y="-38" width="980" height="76" rx="10" class="panel-fill stroke-phase-1" stroke-width="2"/>
    <text x="100" y="-14" font-size="16" font-weight="700" class="text-strong">Body Merkle roots (verify only)</text>
    <text x="100" y="6" font-size="13" class="text-muted">tx_root &#183; bond_root &#183; slashing_root &#183; storage_proof_root &#183; validator_root (pre-block set) &#183; claims_root.</text>
    <text x="100" y="26" font-size="13" class="text-muted">Parse/verify MFCL authorship claims in tx.extra; empty lists use zero sentinels.</text>
  </g>
  <path d="M210,300 L210,318" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,332)">
    <circle cx="30" cy="0" r="20" class="phase-fill-2"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">2</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-2" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">Finality proof</text>
    <text x="100" y="14" font-size="13" class="text-muted">Decode FinalityProof &#183; producer VRF + Schnorr &#183; BLS committee quorum on header_signing_hash.</text>
  </g>
  <path d="M210,370 L210,388" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,402)">
    <circle cx="30" cy="0" r="20" class="phase-fill-3"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">3</text>
    <rect x="80" y="-52" width="980" height="104" rx="10" class="panel-fill stroke-phase-3" stroke-width="2.5"/>
    <text x="100" y="-26" font-size="16" font-weight="700" class="text-strong">Transactions (mutate UTXO + storage + claims)</text>
    <text x="100" y="-4" font-size="13" class="text-muted">Coinbase at tx[0] when producer has payout (amount verified later) &#183; CLSAG + Bulletproofs + balance equation.</text>
    <text x="100" y="16" font-size="13" class="text-critical">Ring-membership guard: every ring (P,C) must exist in utxo with matching commit.</text>
    <text x="100" y="36" font-size="13" class="text-muted">Key-image dedup &#183; storage upload endowment gate &#183; index authorship claims (commit_hash binding + one claim per pubkey/root).</text>
  </g>
  <path d="M210,488 L210,506" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,520)">
    <circle cx="30" cy="0" r="20" class="phase-fill-4"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">4</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-4" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">Equivocation slashing</text>
    <text x="100" y="14" font-size="13" class="text-muted">validator_evolution::apply_equivocation_slashings &#183; forfeited stake credits treasury.</text>
  </g>
  <path d="M210,550 L210,568" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,582)">
    <circle cx="30" cy="0" r="20" class="phase-fill-5"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">5</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-5" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">SPoRA storage proofs</text>
    <text x="100" y="14" font-size="13" class="text-muted">Dedupe per block &#183; verify challenge + Merkle path &#183; accrue_proof_reward (PPB yield).</text>
  </g>
  <path d="M210,612 L210,630" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,644)">
    <circle cx="30" cy="0" r="20" class="phase-fill-6"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">6</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-6" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">Liveness evolution</text>
    <text x="100" y="14" font-size="13" class="text-muted">Walk finality bitmap &#183; multiplicative slash for chronic misses &#183; treasury credit.</text>
  </g>
  <path d="M210,674 L210,692" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,706)">
    <circle cx="30" cy="0" r="20" class="phase-fill-7"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">7</text>
    <rect x="80" y="-38" width="980" height="76" rx="10" class="panel-fill stroke-phase-7" stroke-width="2"/>
    <text x="100" y="-14" font-size="16" font-weight="700" class="text-strong">Bond ops + unbond settlement</text>
    <text x="100" y="6" font-size="13" class="text-muted">Register (BLS-signed, burn stake to treasury) &#183; Unbond enqueue &#183; settle matured pending_unbonds.</text>
    <text x="100" y="26" font-size="13" class="text-muted">Atomic bond-op batch via validator_evolution (shared with light client).</text>
  </g>
  <path d="M210,754 L210,772" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,786)">
    <circle cx="30" cy="0" r="20" class="phase-fill-8"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">8</text>
    <rect x="80" y="-38" width="980" height="76" rx="10" class="panel-fill stroke-phase-8" stroke-width="2"/>
    <text x="100" y="-14" font-size="16" font-weight="700" class="text-strong">Treasury settlement + coinbase</text>
    <text x="100" y="6" font-size="13" class="text-muted">Accrue fee treasury share &#183; drain treasury for storage rewards (emission backstop if short).</text>
    <text x="100" y="26" font-size="13" class="text-muted">Verify coinbase pays subsidy + producer_fee + storage_reward_total.</text>
  </g>
  <path d="M210,834 L210,852" class="pipe" marker-end="url(#m-pipe)"/>

  <g transform="translate(180,868)">
    <circle cx="30" cy="0" r="20" class="phase-fill-9"/>
    <text x="30" y="6" text-anchor="middle" font-size="16" font-weight="700" class="text-num">9</text>
    <rect x="80" y="-30" width="980" height="60" rx="10" class="panel-fill stroke-phase-9" stroke-width="2"/>
    <text x="100" y="-6" font-size="16" font-weight="700" class="text-strong">Post-mutation roots + commit</text>
    <text x="100" y="14" font-size="13" class="text-muted">storage_root over new commitments &#183; utxo_root over accumulator &#183; append block_id.</text>
  </g>

  <g>
    <rect x="80" y="1100" width="340" height="34" rx="8" class="panel-output-ok" stroke-width="1.5"/>
    <text x="250" y="1122" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">&#8594; ApplyOutcome::Ok(new ChainState)</text>
  </g>
  <g>
    <rect x="780" y="1100" width="320" height="34" rx="8" class="panel-output-err" stroke-width="1.5"/>
    <text x="940" y="1122" text-anchor="middle" font-size="13" font-weight="700" class="text-reject">&#8594; ApplyOutcome::Err(errors)</text>
  </g>

  <path d="M1060,230 Q1160,230 1160,1100" class="reject-arrow" marker-end="url(#m-reject)"/>
  <text x="1148" y="660" text-anchor="middle" font-size="12" font-weight="700" class="text-reject" transform="rotate(-90 1148,660)">any phase failure rejects the block</text>
</svg>
