name: RC Validation After CI

# Manual operator dispatch when Nightly must be re-run at a specific green commit.
# Green push CI auto-dispatches Nightly via the dispatch-nightly-rc job in ci.yml (M2.5.18).
# workflow_run backup (M2.5.31): when green CI completes but inline dispatch was skipped or
# cancelled (e.g. cancel-in-progress from a follow-up push), dispatch Nightly here.
# GitHub workflow_dispatch requires a branch/tag ref, not a raw commit SHA.
# Pass ci_head_sha so Nightly validates the exact green commit.
on:
  workflow_dispatch:
    inputs:
      ci_head_sha:
        description: "Green CI commit SHA to check out in Nightly"
        required: false
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  dispatch-nightly:
    name: Dispatch Nightly on green CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push'
      )
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let sha;
            let isBackup = false;
            if (context.eventName === 'workflow_dispatch') {
              sha = context.payload.inputs?.ci_head_sha || context.sha;
            } else {
              isBackup = true;
              const run = context.payload.workflow_run;
              sha = run.head_sha;
              const msg = run.head_commit?.message || '';
              if (msg.includes('[skip ci]')) {
                core.info('Skipping backup dispatch: [skip ci] commit');
                return;
              }
              const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              const inline = jobsData.jobs.find(
                (j) => j.name === 'Dispatch Nightly on green main push',
              );
              if (inline && inline.conclusion === 'success') {
                core.info('Inline dispatch-nightly-rc succeeded; backup not needed');
                return;
              }
              core.info(
                `Backup dispatch: inline job conclusion=${inline?.conclusion ?? 'missing'}`,
              );
            }

            const short = sha.slice(0, 7);
            core.info(`Dispatching Nightly ref=main checkout_sha=${short} backup=${isBackup}`);
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'nightly.yml',
              ref: 'main',
              inputs: {
                checkout_sha: sha,
              },
            });
            core.info('Nightly dispatch submitted');
